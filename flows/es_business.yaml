flow_id: es_business
country: ES
account_type: business
steps:
  - key: company
    title: "Company registration"
    orchestrator: company
    component_flow: components/company/es_business.yaml
    form_schema: CompanyStepES
    on_complete: representative
  - key: representative
    title: "Legal representative"
    orchestrator: representative
    component_flow: components/representative/es_business.yaml
    form_schema: RepresentativeStepES
    on_complete: ubo
  - key: ubo
    title: "Ultimate beneficial owners"
    orchestrator: ubo
    component_flow: components/ubo/default.yaml
    form_schema: UboStep
    on_complete: financial
  - key: financial
    title: "Business activity & bank details"
    orchestrator: financial
    component_flow: components/financial/business_default.yaml
    form_schema: FinancialBusinessStepES
    on_complete: kyb_decision
  - key: kyb_decision
    title: "KYB assessment"
    orchestrator: kyb
    component_flow: components/kyb/default.yaml
    on_complete: credit_decision
  - key: credit_decision
    title: "Business credit assessment"
    orchestrator: credit
    component_flow: components/credit/es_business.yaml
    on_complete: bank_verification
  - key: bank_verification
    title: "Bank account verification"
    orchestrator: bank
    component_flow: components/bank/es_business.yaml
    on_complete: review
  - key: review
    title: "Review and submit"
    orchestrator: review
    component_flow: components/review/default.yaml
    form_schema: ReviewStep
    is_review: true
    on_complete: decision
  - key: decision
    title: "Decision"
    orchestrator: decision
    component_flow: components/decision/default.yaml
    triggers_decision: true
