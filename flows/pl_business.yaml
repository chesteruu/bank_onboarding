flow_id: pl_business
country: PL
account_type: business
steps:
  - key: company
    title: "Company details"
    orchestrator: company
    component_flow: components/company/pl_business.yaml
    form_schema: CompanyStepPL
    on_complete: board
  - key: board
    title: "Board authority"
    orchestrator: board
    component_flow: components/board/pl_business.yaml
    form_schema: BoardStepPL
    on_complete: ubo
  - key: ubo
    title: "Ultimate beneficial owners"
    orchestrator: ubo
    component_flow: components/ubo/default.yaml
    form_schema: UboStep
    on_complete: financial
  - key: financial
    title: "Business activity & bank details"
    orchestrator: financial
    component_flow: components/financial/business_default.yaml
    form_schema: FinancialBusinessStepPL
    on_complete: kyb_decision
  - key: kyb_decision
    title: "KYB assessment"
    orchestrator: kyb
    component_flow: components/kyb/default.yaml
    on_complete: credit_decision
  - key: credit_decision
    title: "Business credit assessment"
    orchestrator: credit
    component_flow: components/credit/pl_business.yaml
    on_complete: bank_verification
  - key: bank_verification
    title: "Bank account verification"
    orchestrator: bank
    component_flow: components/bank/pl_business.yaml
    on_complete: review
  - key: review
    title: "Review and submit"
    orchestrator: review
    component_flow: components/review/default.yaml
    form_schema: ReviewStep
    is_review: true
    on_complete: decision
  - key: decision
    title: "Decision"
    orchestrator: decision
    component_flow: components/decision/default.yaml
    triggers_decision: true
