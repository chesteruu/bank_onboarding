flow_id: es_private
country: ES
account_type: private
steps:
  - key: identity
    title: "Verify identity"
    orchestrator: identity
    component_flow: components/identity/es_private.yaml
    form_schema: IdentityStepES
    on_complete: contact
  - key: contact
    title: "Address in Spain"
    orchestrator: contact
    component_flow: components/contact/default.yaml
    form_schema: ContactStepES
    on_complete: consent
  - key: consent
    title: "Consent & compliance"
    orchestrator: compliance
    component_flow: components/compliance/default.yaml
    form_schema: ConsentStep
    on_complete: financial
  - key: financial
    title: "Employment & affordability"
    orchestrator: affordability_input
    component_flow: components/affordability/default.yaml
    form_schema: FinancialStepES
    on_complete: credit_decision
  - key: credit_decision
    title: "Credit assessment"
    orchestrator: credit
    component_flow: components/credit/es_private.yaml
    on_complete: review
  - key: review
    title: "Review and submit"
    orchestrator: review
    component_flow: components/review/default.yaml
    form_schema: ReviewStep
    is_review: true
    on_complete: decision
  - key: decision
    title: "Decision"
    orchestrator: decision
    component_flow: components/decision/default.yaml
    triggers_decision: true
