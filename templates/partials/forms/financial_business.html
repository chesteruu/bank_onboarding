<label>Annual revenue
  <input name="annual_revenue" type="number" step="0.01" value="{{ existing_answers.get('annual_revenue', '') }}" required>
</label>
<label>Monthly expenses
  <input name="monthly_expenses" type="number" step="0.01" value="{{ existing_answers.get('monthly_expenses', '') }}" required>
</label>
{% if step.form_schema == "FinancialBusinessStepSE" %}
<label>Employee count
  <input name="employee_count" type="number" min="0" value="{{ existing_answers.get('employee_count', '') }}" required>
</label>
{% else %}
<label>IBAN
  <input name="iban" value="{{ existing_answers.get('iban', '') }}" required>
</label>
<label>Account holder
  <input name="account_holder" value="{{ existing_answers.get('account_holder', '') }}" required>
</label>
{% endif %}
